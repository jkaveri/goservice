version: "2"
run:
  tests: false
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
    - wsl_v5
  settings:
    errcheck:
      # fmt.Formatter implementations and similar: writes to fmt.State rarely fail.
      exclude-functions:
        - io.WriteString
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln
    revive:
      max-open-files: 2048
      confidence: 0.8
      severity: warning
      enable-all-rules: false
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
      case-max-lines: 0
      default: all
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: EXC0002
      - path: (.+)\.go$
        text: should have a package comment
      - path: (.+)\.go$
        text: G115
      - path: (.+)\.go$
        text: G117
      - path: (.+)\.go$
        text: G118
      - path: (.+)\.go$
        text: 'printf: non-constant format string in call to'
    paths:
      - .*_test\.go
      - .*\.pb\.go
      - .*\.gen\.go
      - .*/mock/.*
      - examples/

formatters:
  enable:
    - gofumpt
    - golines
  settings:
    gofumpt:
      module-path: github.com/jkaveri/goservice
    golines:
      max-len: 80
      tab-len: 4
      shorten-comments: true
      reformat-tags: true
      chain-split-dots: true
  exclusions:
    generated: lax
    paths:
      - .*_test\.go
      - .*\.pb\.go
      - .*\.gen\.go
      - .*/mock/.*
      - examples/
